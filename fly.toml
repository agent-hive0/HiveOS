# fly.toml app configuration file for hive-adams-workspace11 (customer colony)
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'hive-adams-workspace11'
primary_region = 'iad'

[build]

[[mounts]]
  source = 'paperclip'
  destination = '/paperclip'

[http_service]
  internal_port = 3100
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 2048