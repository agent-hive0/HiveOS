name: Fly Restart

on:
  workflow_dispatch:
    inputs:
      app:
        description: Fly app name (e.g. hive-adams-workspace11)
        required: true
        type: string
      machine:
        description: Machine id (optional). If empty, restarts all machines for the app.
        required: false
        type: string

concurrency:
  group: fly-restart-${{ inputs.app }}
  cancel-in-progress: false

jobs:
  restart:
    name: Restart Fly app
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Diagnose access
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -eu
          echo "--- whoami ---"
          flyctl auth whoami || true
          echo "--- orgs ---"
          flyctl orgs list || true
          echo "--- apps list (token scope) ---"
          flyctl apps list || true
          echo "--- app status target ---"
          flyctl status -a "${{ inputs.app }}" || true
          echo "--- machines ---"
          flyctl machine list -a "${{ inputs.app }}" || true
      - name: Restart machine(s)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -eu
          if [ -n "${{ inputs.machine }}" ]; then
            echo "Restarting machine ${{ inputs.machine }} on ${{ inputs.app }}"
            flyctl machine restart "${{ inputs.machine }}" -a "${{ inputs.app }}" || true
          fi
          echo "--- attempting app-wide restart ---"
          flyctl apps restart "${{ inputs.app }}" || true
